    <!-- Google Structured Data (Schema JSON-LD) -->

      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "LinkUpply",
      "url": "https://linkupply.vercel.app/",
      "applicationCategory": "SocialNetworkingApplication",

      "description": "A fast, secure, and free real-time chatting and networking application like WhatsApp and LinkedIn.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
    
    <script>
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        window.dispatchEvent(new Event('deferredpromptready'));
      });
