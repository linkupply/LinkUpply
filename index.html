<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#000000" />

    <link rel="icon" type="image/png" href="/logo1.jpg" />
    <link rel="manifest" href="/manifest.json" />
    <title>LinkUpply</title>

    <!-- Primary Meta Tags -->
    <meta name="title" content="LinkUpply | Fast, Secure & Free Chat App Like WhatsApp" />
    <meta name="description" content="Connect instantly with LinkUpply! The ultimate free chatting app for secure messaging, real-time chat, and social networking. Join the next-gen chat platform today." />
    <meta name="keywords" content="LinkUpply, chat app, messaging app, free chatting site, secure messenger, real-time chat, network like linkedin, chat like whatsapp, text app, online messaging" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="LinkUpply Team" />

    <!-- Open Graph / Facebook / WhatsApp (Social Media Cards) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://linkupply.vercel.app/" />
    <meta property="og:title" content="LinkUpply | Fast, Secure & Free Chat App Like WhatsApp" />
    <meta property="og:description" content="Connect instantly with LinkUpply! Secure messaging, real-time chat, and professional networking all in one place." />
    <meta property="og:image" content="https://vercel.app" />

    <!-- Twitter Meta Tags -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://linkupply.vercel.app/" />
    <meta property="twitter:title" content="LinkUpply | Fast, Secure & Free Chat App Like WhatsApp" />
    <meta property="twitter:description" content="Connect instantly with LinkUpply! Secure messaging, real-time chat, and professional networking all in one place." />
    <meta property="twitter:image" content="https://vercel.app" />

    <!-- SEO Optimization Tags -->
    <link rel="canonical" href="https://linkupply.vercel.app/" />

    <!-- Google Structured Data (Schema JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "LinkUpply",
      "url": "https://linkupply.vercel.app/",
      "applicationCategory": "SocialNetworkingApplication",
      "operatingSystem": "All",
      "description": "A fast, secure, and free real-time chatting and networking application like WhatsApp and LinkedIn.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
    
    <script>
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        window.dispatchEvent(new Event('deferredpromptready'));
      });
    </script>
  </head>
  <body style="background-color: #0f172a; color: white; margin: 0; min-height: 100dvh;">
    <div id="root">
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
